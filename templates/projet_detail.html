<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ projet['titre'] }} | Géniel Gandaho</title>
    <link rel="icon" href="{{ url_for('static', filename='img/geniel_profil.jpeg') }}?v=2" type="image/jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 antialiased font-sans">

    <nav class="fixed w-full bg-white/95 backdrop-blur-sm shadow-sm z-50 border-b border-gray-100">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="{{ url_for('index') }}" class="font-extrabold text-xl tracking-tight text-blue-900">G. GANDAHO</a>
            <a href="{{ url_for('index') }}" class="text-sm font-semibold bg-gray-100 text-gray-700 hover:bg-gray-200 px-4 py-2 rounded-full transition flex items-center">
                <i class="fa-solid fa-arrow-left mr-2"></i> Retour à l'accueil
            </a>
        </div>
    </nav>

    <section class="pt-32 pb-16 px-4 bg-white border-b border-gray-100">
        <div class="max-w-4xl mx-auto">
            <span class="text-xs font-bold text-{{ projet['color'] }}-600 bg-{{ projet['color'] }}-50 border border-{{ projet['color'] }}-100 px-3 py-1 rounded-full uppercase tracking-wider mb-4 inline-block">
                {{ projet['cate'] }}
            </span>
            <h1 class="text-5xl font-extrabold text-gray-900 tracking-tighter leading-tight mb-6">
                {{ projet['titre'] }}
            </h1>
            
            <div class="flex flex-wrap gap-2.5">
                {% for tag in projet['tags'] %}
                <span class="bg-gray-50 text-gray-600 px-3 py-1 rounded-md text-xs font-semibold border border-gray-200">{{ tag }}</span>
                {% endfor %}
            </div>
        </div>
    </section>

    <section class="py-16 px-4 bg-gray-50">
        <div class="max-w-4xl mx-auto grid grid-cols-1 gap-12">
            
            {% if projet['drive_id'] %}
            <div class="bg-white p-3 rounded-2xl shadow-md border border-gray-200">
                <div class="aspect-video relative overflow-hidden rounded-xl">
                    <iframe 
                        class="absolute inset-0 w-full h-full"
                        src="https://drive.google.com/file/d/{{ projet['drive_id'] }}/preview" 
                        title="{{ projet['titre'] }} - Démonstration vidéo"
                        allow="autoplay" 
                        allowfullscreen>
                    </iframe>
                </div>
            </div>
            {% endif %}

            <div class="prose prose-lg prose-gray max-w-none bg-white p-10 rounded-2xl shadow-sm border border-gray-200 leading-relaxed text-gray-700">
                {{ projet['description_complete']|safe }}
            </div>
            
        </div>
    </section>

    <footer class="bg-white text-gray-500 py-8 text-center text-sm border-t border-gray-200 mt-16">
        <p>&copy; 2026 Géniel Immaculé M. GANDAHO. Information Systems Specialist | BENIN.</p>
    </footer>

</body>
</html>
